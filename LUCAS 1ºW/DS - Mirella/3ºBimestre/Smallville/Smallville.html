<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmallVille</title>
    <style>
        body {
            background: #e63737;
            background: radial-gradient(circle, rgba(230, 55, 55, 1) 0%, rgba(224, 0, 0, 1) 47%, rgba(0, 0, 0, 1) 100%);
            text-align: center;
        }
        h1{
            text-align: center;
            
        }
        .corBranca {
            color: aliceblue;
        }
        img {
    height: 230px;
    width: 300px;
    border: 10px solid black;
    cursor: pointer;
    transition: transform 0.3s ease, border-color 0.3s ease;
}

img:hover {
    border: 10px solid rgb(110, 28, 28);
    transform: scale(1.5);
}
    </style>
</head>
<body>
    <h1 class="corBranca">SmallVille</h1>
    
    <br><br>

    <img src="foto1.jpg" alt="Foto smallville 1"\>
    <img src="foto2.jpg" alt="Foto smallville 2"\>

    <br><br>

</html>
